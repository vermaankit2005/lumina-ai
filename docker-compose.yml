services:
  postgres:
    image: postgres:16-alpine
    container_name: lumina-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-luminaai}
      POSTGRES_USER: ${POSTGRES_USER:-lumina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumina_secret}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
